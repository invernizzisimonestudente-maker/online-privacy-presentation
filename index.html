<!--
Slide 1 — Titolo

Privacy e protezione dei dati personali

Come vengono raccolti e utilizzati i dati

Rischi e tutela della privacy online

Tecniche di protezione

Slide 2 — Introduzione

Oggi condividiamo molti dati online ogni giorno

App, social e siti web raccolgono informazioni costantemente

Obiettivo: capire come avviene e come proteggersi

Slide 3 — Cosa sono i dati personali

Informazioni che identificano una persona

Nome, email, numero di telefono

Dati di posizione

Abitudini online

Anche dati “invisibili” (cookie, cronologia)

Slide 4 — Come vengono raccolti i dati

Navigazione su internet (cookie, tracker)

Social media e app

Acquisti online e registrazioni

Geolocalizzazione e dispositivi mobili

Slide 5 — A cosa servono i dati

Pubblicità personalizzata

Miglioramento dei servizi digitali

Analisi di mercato

In alcuni casi, vendita a terze parti

Slide 6 — GDPR e tutela dei dati

Normativa europea sulla privacy

Diritti degli utenti:

Accesso ai dati

Cancellazione (“diritto all’oblio”)

Consenso informato

Obblighi per aziende e siti web

Slide 7 — Rischi per la privacy

Furto di identità

Profilazione eccessiva

Tracciamento senza consenso

Uso improprio dei dati

Slide 8 — Tecniche per proteggere la privacy

Password forti e autenticazione a due fattori

Limitare i dati condivisi online

Controllare le impostazioni privacy delle app

Aggiornamenti software regolari

Slide 9 — Strumenti di protezione

VPN: nasconde la connessione e la posizione

Navigazione in incognito (limita i dati salvati localmente)

Browser più sicuri (es. con blocco tracker)

Ad blocker

Slide 10 — Social media e privacy

Condivisione eccessiva di informazioni personali

Geolocalizzazione nei post

Impostazioni privacy spesso ignorate

Consigli:

Condividere meno dati sensibili

Controllare chi vede i contenuti

(Facoltativa) Slide 11 — Conclusione

La privacy online non è automatica

Serve consapevolezza e attenzione

Piccole azioni = grande protezione dei dati
-->
